<!-- THE CSS STYLES (Make sure this is inside your <head> or combined with your main styles) -->
<style>
  .portfolio {
    padding: 120px 48px;
    max-width: 1200px;
    margin: 0 auto;
  }
  
  .portfolio-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 24px;
  }

  .portfolio-item {
    position: relative;
    background-color: #111; /* Fallback color if image is missing */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 320px; /* Made slightly taller to show off your photos better */
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid #1a1a1a;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 30px;
    transition: transform 0.3s ease, border-color 0.3s ease;
  }

  /* Subtle lift effect on hover */
  .portfolio-item:hover {
    transform: translateY(-4px);
    border-color: var(--cobalt, #1A6EFF);
  }

  /* This adds a slick dark gradient mask over your photos so the white text pops */
  .portfolio-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(10,10,10,0.95) 10%, rgba(10,10,10,0.4) 60%, transparent 100%);
    z-index: 1;
    transition: opacity 0.3s ease;
  }

  /* Lights up the image a bit more when hovered */
  .portfolio-item:hover::before {
    background: linear-gradient(to top, rgba(10,10,10,0.95) 20%, rgba(10,10,10,0.2) 70%, transparent 100%);
  }

  .portfolio-item-content {
    position: relative;
    z-index: 2;
  }

  .portfolio-tag {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold, #C8A96E);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .portfolio-title {
    font-family: var(--bebas, sans-serif);
    font-size: 28px;
    letter-spacing: 1px;
    color: var(--white, #F0EDE8);
  }
</style>

<!-- THE HTML STRUCTURE -->

    <!-- Project 1 (Now using your provided image link) -->
